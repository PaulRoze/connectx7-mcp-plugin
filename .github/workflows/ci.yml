name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: mcp-server
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: mcp-server
        run: ruff check src/ tests/

      - name: Check formatting with ruff
        working-directory: mcp-server
        run: ruff format --check src/ tests/

      - name: Run tests
        working-directory: mcp-server
        run: pytest tests/ -v

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate plugin.json
        run: python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"

      - name: Validate marketplace.json
        run: python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

      - name: Check version consistency
        run: |
          PLUGIN_VER=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          MARKET_VER=$(python3 -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")
          PYPROJ_VER=$(python3 -c "
          import re
          txt = open('mcp-server/pyproject.toml').read()
          print(re.search(r'version\s*=\s*\"(.+?)\"', txt).group(1))
          ")
          INIT_VER=$(python3 -c "
          import re
          txt = open('mcp-server/src/connectx7_mcp/__init__.py').read()
          print(re.search(r'__version__\s*=\s*\"(.+?)\"', txt).group(1))
          ")
          echo "plugin.json:      $PLUGIN_VER"
          echo "marketplace.json: $MARKET_VER"
          echo "pyproject.toml:   $PYPROJ_VER"
          echo "__init__.py:      $INIT_VER"
          if [ "$PLUGIN_VER" != "$MARKET_VER" ] || [ "$PLUGIN_VER" != "$PYPROJ_VER" ] || [ "$PLUGIN_VER" != "$INIT_VER" ]; then
            echo "::error::Version mismatch detected!"
            exit 1
          fi
          echo "All versions match: $PLUGIN_VER"

      - name: Check skill frontmatter
        run: |
          for skill in skills/*/SKILL.md; do
            if ! head -5 "$skill" | grep -q "^name:"; then
              echo "::error::Missing 'name' in $skill frontmatter"
              exit 1
            fi
            if ! head -5 "$skill" | grep -q "^description:"; then
              echo "::error::Missing 'description' in $skill frontmatter"
              exit 1
            fi
            echo "OK: $skill"
          done
